# Monster definitions (SOW section 13). entity-type must be a valid org.bukkit.entity.EntityType.
# ai-type: PASSIVE | AGGRESSIVE | RANGED
# weakness: optional ElementType (NONE by default). A weapon whose element matches deals
# a flat x1.5 damage multiplier (CombatDamageListener); any other weapon (including NONE)
# deals normal (x1.0) damage.
# Each drop entry sets either weapon-id (an items.yml id) or vanilla-material (a Material name).
# crit-rate: optional percent chance (0-100) this monster's attacks crit (default 0 = never).
# crit-multiplier: optional multiplier applied on a crit (default 1.5, only matters if crit-rate > 0).
# abilities: optional periodic attacks cast at nearby players (MonsterAbilityCastService), same
# shape as bosses.yml's own abilities block: type is AOE_SLAM or FIREBALL_BARRAGE, damage/radius/
# cooldown-seconds/particle/sound/announce-message. Do not configure abilities here for a monster
# id that's also referenced by bosses.yml's monster-id (goblin_king, flame_lord below) - that
# entity spawns through the separate boss ability system instead when spawned as a boss.
config-version: 2

