# Boss definitions (SOW section 14). A boss wraps an existing monsters.yml entry
# (monster-id) and layers HP-threshold phases, an enrage multiplier, and periodic ability
# casting on top of it - spawning, attack/defense, and death rewards all come from that
# underlying monster entry.
#
# abilities.type: AOE_SLAM (instant radius damage burst) | FIREBALL_BARRAGE (fires a
# SmallFireball at every nearby player, entity-damage-only impact, no block damage).
# particle must be a valid org.bukkit.Particle name, sound a valid org.bukkit.Sound name.
# At most one due ability fires per boss per tick (checked every second), oldest-cooldown
# first in the order they're listed.
config-version: 2

bosses:
  goblin_king_boss:
    monster-id: goblin_king
    enrage-hp-percent: 25
    enrage-damage-multiplier: 1.75
    phases:
      phase_1:
        hp-threshold-percent: 70
        announce-message: "&%c&lゴブリンキングが激怒し始めた！"
      phase_2:
        hp-threshold-percent: 40
        announce-message: "&%4&lゴブリンキングが雄叫びを上げる！"

  flame_lord_boss:
    monster-id: flame_lord
    enrage-hp-percent: 25
    enrage-damage-multiplier: 2.0
    phases:
      phase_1:
        hp-threshold-percent: 60
        announce-message: "&%6&l業火の王ブレイズロードが怒りの咆哮を上げた！"
      phase_2:
        hp-threshold-percent: 25
        announce-message: "&%4&l業火の王の周囲に紅蓮の炎が渦巻く！"
    abilities:
      meteor_slam:
        name: "業火の一撃"
        type: AOE_SLAM
        damage: 18
        radius: 6
        cooldown-seconds: 12
        particle: FLAME
        sound: ENTITY_BLAZE_SHOOT
        announce-message: "&%c業火の王が地面を叩きつけた！"
      fire_barrage:
        name: "火炎弾幕"
        type: FIREBALL_BARRAGE
        damage: 10
        radius: 3
        cooldown-seconds: 8
        sound: ENTITY_BLAZE_SHOOT
        announce-message: "&%6業火の王が火球をばらまいた！"

  ancient_treant_boss:
    monster-id: ancient_treant
    enrage-hp-percent: 20
    enrage-damage-multiplier: 1.6
    phases:
      phase_1:
        hp-threshold-percent: 65
        announce-message: "&%2&l古の大樹人の樹皮が軋み始めた！"
      phase_2:
        hp-threshold-percent: 30
        announce-message: "&%2&l古の大樹人が大地の怒りを解き放つ！"
    abilities:
      root_slam:
        name: "根の一撃"
        type: AOE_SLAM
        damage: 16
        radius: 5
        cooldown-seconds: 10
        particle: BLOCK_CRACK
        sound: ENTITY_IRON_GOLEM_ATTACK
        announce-message: "&%2古の大樹人が根で薙ぎ払った！"

  abyssal_wraith_boss:
    monster-id: abyssal_wraith
    enrage-hp-percent: 25
    enrage-damage-multiplier: 1.9
    phases:
      phase_1:
        hp-threshold-percent: 60
        announce-message: "&%5&l深淵の亡霊が闇を纏い始めた！"
      phase_2:
        hp-threshold-percent: 25
        announce-message: "&%5&l深淵の亡霊が虚無の力を解き放つ！"
    abilities:
      void_barrage:
        name: "虚無弾幕"
        type: FIREBALL_BARRAGE
        damage: 12
        radius: 3
        cooldown-seconds: 9
        sound: ENTITY_WITHER_SHOOT
        announce-message: "&%5深淵の亡霊が虚無の弾をばらまいた！"

  venom_broodmother_boss:
    monster-id: venom_broodmother
    enrage-hp-percent: 20
    enrage-damage-multiplier: 1.7
    phases:
      phase_1:
        hp-threshold-percent: 55
        announce-message: "&%2&l毒の女王蜘蛛が卵嚢を震わせた！"
      phase_2:
        hp-threshold-percent: 20
        announce-message: "&%4&l毒の女王蜘蛛が猛毒をまき散らす！"
    abilities:
      venom_slam:
        name: "毒撃"
        type: AOE_SLAM
        damage: 13
        radius: 4
        cooldown-seconds: 10
        particle: WITCH
        sound: ENTITY_SPIDER_HURT
        announce-message: "&%2毒の女王蜘蛛が毒を撒き散らした！"
